services:
  - type: web
    name: petflow
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn petflowapi.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: petflow.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://petflow.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://petflow.onrender.com
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: petflow-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: petflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: petflow-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: petflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: petflow-db
          property: port
      - key: DB_SSLMODE
        value: require

databases:
  - name: petflow-db
    databaseName: petflow
    user: petflow
